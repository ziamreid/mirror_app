
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fluid Touch Simulation</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000008;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    #c {
      display: block;
      width: 100%;
      height: 100%;
      cursor: none;
      background: #000;
      border-radius: 16px;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    resize();
    window.addEventListener('resize', resize);

    const W = () => canvas.getBoundingClientRect().width;
    const H = () => canvas.getBoundingClientRect().height;

    const PARTICLE_COUNT = 280;
    const particles = [];

    let mouse = { x: W() / 2, y: H() / 2, active: false };

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * W();
        this.y = Math.random() * H();
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.size = Math.random() * 3 + 1;
        this.life = Math.random();
        this.maxLife = Math.random() * 0.008 + 0.002;
        this.hue = 240 + Math.random() * 80;
        this.alpha = Math.random() * 0.6 + 0.2;
      }

      update(t) {
        const w = W();
        const h = H();
        const angle = (Math.sin(this.x * 0.008 + t * 0.3) + Math.cos(this.y * 0.008 + t * 0.2)) * Math.PI * 2;
        this.vx += Math.cos(angle) * 0.04;
        this.vy += Math.sin(angle) * 0.04;

        if (mouse.active) {
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
          const force = Math.max(0, 120 - dist) / 120;
          this.vx -= (dx / dist) * force * 2.5;
          this.vy -= (dy / dist) * force * 2.5;
        }

        this.vx *= 0.96;
        this.vy *= 0.96;
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) this.x = w;
        if (this.x > w) this.x = 0;
        if (this.y < 0) this.y = h;
        if (this.y > h) this.y = 0;

        this.life += this.maxLife;
        if (this.life > 1) {
          this.life = 0;
          this.alpha = Math.random() * 0.6 + 0.2;
        }
      }

      draw() {
        const pulse = 0.6 + Math.sin(this.life * Math.PI * 2) * 0.4;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * pulse, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 80%, 75%, ${this.alpha * pulse})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }

    function drawConnections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 80) {
            const alpha = (1 - distance / 80) * 0.12;
            const hue = (particles[i].hue + particles[j].hue) / 2;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `hsla(${hue}, 70%, 70%, ${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    let t = 0;
    function loop() {
      const w = W();
      const h = H();
      ctx.fillStyle = 'rgba(0,0,8,0.18)';
      ctx.fillRect(0, 0, w, h);

      drawConnections();
      for (const particle of particles) {
        particle.update(t);
        particle.draw();
      }

      if (mouse.active) {
        const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 80);
        grad.addColorStop(0, 'rgba(180,120,255,0.15)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 80, 0, Math.PI * 2);
        ctx.fill();
      }

      t += 0.012;
      requestAnimationFrame(loop);
    }

    loop();

    function getPos(e, el) {
      const rect = el.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    }

    canvas.addEventListener('mousemove', (e) => {
      const p = getPos(e, canvas);
      mouse.x = p.x;
      mouse.y = p.y;
      mouse.active = true;
    });
    canvas.addEventListener('mouseleave', () => (mouse.active = false));
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const p = getPos(e, canvas);
      mouse.x = p.x;
      mouse.y = p.y;
      mouse.active = true;
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const p = getPos(e, canvas);
      mouse.x = p.x;
      mouse.y = p.y;
    }, { passive: false });
    canvas.addEventListener('touchend', () => (mouse.active = false));
  </script>
</body>
</html>
