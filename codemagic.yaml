workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: latest
      ruby: 2.7.5
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Build iOS app
        script: |
          flutter build ios --simulator --release
    artifacts:
      - build/ios/iphonesimulator/*.app
      - build/ios/iphonesimulator/*.app/Frameworks

  web-workflow:
    name: Web Workflow
    instance_type: linux
    max_build_duration: 60
    environment:
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Build web app
        script: |
          flutter build web --release
    artifacts:
      - build/web/**
